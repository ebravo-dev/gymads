name: gymads
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  get: ^4.6.6
  http: ^1.1.2
  mobile_scanner: ^3.5.5
  intl_phone_number_input: ^0.7.4
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  material_design_icons_flutter: ^7.0.7296
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  permission_handler: ^11.1.0
  flutter_dotenv: ^5.2.1
  supabase_flutter: ^2.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
    - assets/icons/
    - assets/images/
